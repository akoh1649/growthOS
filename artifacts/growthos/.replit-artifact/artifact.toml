kind = "web"
previewPath = "/"
title = "GrowthOS"
version = "1.0.0"
id = "artifacts/growthos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20945

[services.development]
run = "pnpm --filter @workspace/growthos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/growthos", "run", "build" ]
publicDir = "artifacts/growthos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20945"
BASE_PATH = "/"
