kind = "web"
previewPath = "/mobile/"
title = "GrowthOS Mobile"
version = "1.0.0"
id = "artifacts/mobile"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 3000

[services.development]
run = "node /home/runner/workspace/artifacts/mobile/scripts/dev-proxy.mjs"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.env]
PORT = "3000"
BASE_PATH = "/mobile/"
